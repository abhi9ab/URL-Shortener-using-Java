# Application Configuration

# Server port
server.port=8080

# H2 Database Configuration
# spring.datasource.url: Database connection string for H2 (in-memory database)
# "mem:urlshortenerdb" means the database is stored in memory and resets on restart
# To persist data, use: jdbc:h2:file:./data/urlshortenerdb
spring.datasource.url=jdbc:h2:mem:urlshortenerdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
# Allows us to access database UI at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate Configuration
# spring.jpa.database-platform: Tells Hibernate which SQL dialect to use
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# spring.jpa.hibernate.ddl-auto=create-drop: 
# Automatically creates tables from @Entity classes on startup
# Drops tables when application stops (good for development)
# Options:
# - create-drop: Create and drop on restart (development)
# - create: Create tables (overwrites existing)
# - update: Update existing tables (recommended for development)
# - validate: Check schema without modifying (production)
spring.jpa.hibernate.ddl-auto=create-drop

# Show SQL queries in console (helpful for learning)
spring.jpa.show-sql=true

# Format SQL queries nicely
spring.jpa.properties.hibernate.format_sql=true

# Application name
spring.application.name=urlshortener
